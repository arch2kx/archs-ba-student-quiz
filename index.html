<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        // Must be first script in head - blocks rendering to prevent flash
        (function () {
            const theme = localStorage.getItem('theme');
            if (theme === 'dark') {
                document.documentElement.classList.add('dark-mode');
  }
})();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blue Archive Student Quiz</title>

    <link rel="apple-touch-icon" sizes="180x180" href="favicon_io/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon_io/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon_io/favicon-16x16.png">
    <link rel="manifest" href="favicon_io/site.webmanifest">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css?v=9" type="text/css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
<body>
    <script type="module" src="js/script.js"></script>

    <script>
        // Apply dark mode to body immediately after it exists
        if (document.documentElement.classList.contains('dark-mode')) {
            document.body.classList.add('dark-mode');
            window.addEventListener('DOMContentLoaded', function() {
                const themeIcon = document.querySelector('#theme-toggle .theme-icon');
                if (themeIcon) { themeIcon.src = 'images/sun.webp'; themeIcon.alt = 'Toggle theme'; }
                const logo = document.getElementById('logo');
                if (logo) logo.src = 'images/ba_student_quiz_logo_dark.png';
            });
        }
    </script>
    <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode">
        <img class="theme-icon" src="images/crescent-moon.webp" alt="Toggle theme">
    </button>

    <div class="container">
        <!--<h1>Blue Archive Student Quiz</h1>-->
        <img id="logo" src="images/ba_student_quiz_logo.png" alt="Blue Archive Student Quiz" class="logo">

        <div id="setup-screen" class="screen active">
            <h2>Quiz Settings</h2>

            <div class="setting-group">
                <label for="quiz-type">Quiz Type:</label>
                <select id="quiz-type">
                    <option value="age" selected>Age Quiz</option>
                    <option value="name">Name Quiz</option>
                    <option value="academy">Academy Quiz</option>
                    <option value="birthday">Birthday Quiz</option>
                    <option value="height">Height Quiz</option>
                    <option value="voice">Voice Quiz</option>
                    <option value="role">Role Quiz</option>
                    <option value="damageType">Damage Type Quiz</option>
                    <option value="armorType">Armor Type Quiz</option>
                    <option value="weapon">Weapon Quiz</option>
                    <option value="mixed">Mixed (All Types)</option>
                </select>
            </div>

            <div class="setting-group">
                <label for="num-questions">Number of Questions:</label>
                <select id="num-questions">
                    <option value="5">5</option>
                    <option value="10" selected>10</option>
                    <option value="15">15</option>
                    <option value="20">20</option>
                    <option value="30">30</option>
                    <option value="custom">Custom</option>
                </select>
                <div id="custom-questions-wrapper" style="display:none; margin-top: 10px; display: none;">
                    <input type="number" id="custom-questions" min="5" max="100" value="10" placeholder="5–100">
                    <span style="margin-left: 8px; color: var(--text-secondary); font-size: 14px;">questions (5–100)</span>
                </div>
            </div>

            <div class="setting-group">
                <label for="answer-type">Answer Type:</label>
                <select id="answer-type">
                    <option value="multiple-choice">Multiple Choice</option>
                    <option value="type-in">Type In Answer</option>
                </select>
            </div>

            <div class="setting-group">
                <label for="student-order">Student Selection:</label>
                <select id="student-order">
                    <option value="random">Random</option>
                    <option value="popular">Popular First</option>
                    <option value="unpopular">Least Popular First</option>
                </select>
            </div>

            <div class="setting-group">
                <label for="timer-enabled">
                    <input type="checkbox" id="timer-enabled"> Enable Timer
                    <span class="checkmark"></span>
                </label>
            </div>

            <div class="setting-group" id="timer-settings" style="display: none;">
                <label>Time per Question:</label>
                <div class="timer-options">
                    <label class="timer-option">
                        <input type="radio" name="timer-preset" value="60" checked>
                        <span>Easy (60s)</span>
                    </label>
                    <label class="timer-option">
                        <input type="radio" name="timer-preset" value="30">
                        <span>Medium (30s)</span>
                    </label>
                    <label class="timer-option">
                        <input type="radio" name="timer-preset" value="15">
                        <span>Hard (15s)</span>
                    </label>
                    <label class="timer-option">
                        <input type="radio" name="timer-preset" value="custom">
                        <span>Custom:</span>
                        <div class="timer-custom-wrapper">
                            <input type="number" id="timer-custom" min="5" max="60" value="30" disabled>
                            <span>seconds</span>
                        </div>
                    </label>
                </div>
            </div>

            <button id="start-btn" class="btn-primary">Start Quiz</button>
            <div id="loading" class="loading hidden">Loading student data...</div>
            <div id="error-message" class="error hidden"></div>
        </div>

        <div id="quiz-screen" class="screen">
            <div class="quiz-header">
                <div class="progress">
                    Question <span id="current-question">1</span> of <span id="total-questions">10</span>
                </div>
                <div id="timer-display" class="timer-display hidden">
                    Time: <span id="timer-value">30</span>s
                </div>
                <div class="score">
                    Score: <span id="current-score">0</span>
                </div>
            </div>

            <div class="student-display">
                <img id="student-image" src="" alt="Student" class="student-image">
                <h2 id="student-name"></h2>
            </div>

            <div class="question">
                <h3>How old is this student?</h3>
            </div>

            <div id="answer-container" class="answer-container">
                <!-- Will be populated dynamically -->
            </div>

            <div id="feedback" class="feedback hidden">
                <p id="feedback-text"></p>
                <button id="next-btn" class="btn-primary">Next Question</button>
            </div>
        </div>

        <div id="results-screen" class="screen">
            <h2>Quiz Complete!</h2>
            <div class="final-score">
                <p>Your Score:</p>
                <p class="score-large"><span id="final-score">0</span> / <span id="final-total">10</span></p>
                <p class="percentage"><span id="percentage">0</span>%</p>
            </div>
            <div id="results-details" class="results-details">
                <!-- Will be populated with question results -->
            </div>
            
            <div class="result-actions">
                <button id="restart-btn" class="btn-primary">Take Another Quiz</button>
            </div>

            <div class="x-share-container">
                <button class="x-share-button">
                    <i class="fa-brands fa-x-twitter"></i>
                    Share Score
                </button>
            </div>

        </div>
    </div>


    <!-- Attribution Footer -->
    <footer class="attribution-footer">
        <div class="attribution-content">
            <p class="made-by">Created by <strong>arch2kx</strong></p>
            <p class="ba-attribution">Blue Archive is developed by NEXON Games and published by Nexon and Yostar.<br>This is a hobby fan project!</br></p>
            <div class="social-links">
                <a href="https://github.com/arch2kx" target="_blank" rel="noopener noreferrer" class="social-link" title="GitHub">
                    <i class="fa-brands fa-github"></i>
                    <span class="social-text">GitHub</span>
                </a>
                <!-- Add more links here later (Ko-fi, etc.) -->
                <!-- Example:
                <a href="YOUR_KOFI_LINK" target="_blank" rel="noopener noreferrer" class="social-link" title="Ko-fi">
                    <span class="social-icon">☕</span>
                    <span class="social-text">Ko-fi</span>
                </a>
                -->
            </div>
        </div>
    </footer>
</body>
</html>
